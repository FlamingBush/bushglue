[project]
name = "bushutil"
version = "0.1.0"
description = "Shared utilities for Bush Glue services"
requires-python = ">=3.11"
dependencies = [
    "paho-mqtt>=2.0",
]

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "pytest-mock>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
