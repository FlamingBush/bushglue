plugins {
    id 'com.android.application'
}

android {
    namespace 'com.bushglue.valve'
    compileSdk 36
    buildToolsVersion "35.0.0"

    defaultConfig {
        applicationId "com.bushglue.valve"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        debug {
            // default debug signing; installs straight via adb
        }
    }
}
