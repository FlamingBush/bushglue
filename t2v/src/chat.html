<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Text-to-Verse Chat</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: #f5f5f5;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
            #header {
                background: #333;
                color: white;
                padding: 1rem;
                text-align: center;
            }
            #chat-container {
                flex: 1;
                display: flex;
                flex-direction: column;
                max-width: 800px;
                width: 100%;
                margin: 0 auto;
                background: white;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            #messages {
                flex: 1;
                overflow-y: auto;
                padding: 1rem;
            }
            .message {
                margin-bottom: 1rem;
                padding: 0.75rem;
                border-radius: 8px;
            }
            .message.user {
                background: #007bff;
                color: white;
                margin-left: 20%;
            }
            .message.bot {
                background: #e9ecef;
                margin-right: 20%;
            }
            .message.error {
                background: #dc3545;
                color: white;
            }
            .message-label {
                font-weight: bold;
                font-size: 0.85rem;
                margin-bottom: 0.25rem;
                opacity: 0.8;
            }
            .verse-text {
                font-size: 1.1rem;
                line-height: 1.5;
                margin-bottom: 0.5rem;
            }
            .verse-meta {
                font-size: 0.9rem;
                opacity: 0.7;
                font-style: italic;
            }
            .verse-description {
                font-size: 0.85rem;
                opacity: 0.6;
                margin-top: 0.2rem;
            }
            .verse-original {
                font-size: 0.85rem;
                opacity: 0.5;
                margin-top: 0.25rem;
                font-style: italic;
            }
            .json-toggle {
                margin-top: 0.5rem;
                padding: 0.25rem 0.5rem;
                background: rgba(0, 0, 0, 0.1);
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 0.85rem;
            }
            .json-content {
                display: none;
                margin-top: 0.5rem;
                padding: 0.5rem;
                background: #f8f9fa;
                border-radius: 4px;
                font-family: monospace;
                font-size: 0.85rem;
                white-space: pre-wrap;
                word-break: break-all;
            }
            .json-content.visible {
                display: block;
            }
            #chat-form {
                display: flex;
                flex-direction: column;
                padding: 1rem;
                border-top: 1px solid #dee2e6;
                gap: 0.5rem;
            }
            #chat-input-row {
                display: flex;
                gap: 0.5rem;
            }
            #chat-options {
                display: flex;
                align-items: center;
                gap: 0.4rem;
                font-size: 0.9rem;
                color: #555;
                flex-wrap: wrap;
            }
            #question {
                flex: 1;
                padding: 0.75rem;
                border: 1px solid #ced4da;
                border-radius: 4px;
                font-size: 1rem;
            }
            #question:focus {
                outline: none;
                border-color: #007bff;
            }
            button {
                padding: 0.75rem 1.5rem;
                background: #007bff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 1rem;
            }
            button:hover {
                background: #0056b3;
            }
            button:disabled {
                background: #6c757d;
                cursor: not-allowed;
            }
        </style>
    </head>
    <body>
        <div id="header">
            <h1>Text-to-Verse Chat</h1>
            <p>Ask a question and get a relevant verse</p>
        </div>
        <div id="chat-container">
            <div id="messages"></div>
            <form id="chat-form">
                <div id="chat-input-row">
                    <input
                        type="text"
                        id="question"
                        placeholder="Ask a question..."
                        autocomplete="off"
                        required
                    />
                    <button type="submit" id="send-btn">Send</button>
                </div>
                <div id="chat-options">
                    <label for="collection-select">Collection</label>
                    <select id="collection-select">
                        <option value="">Auto</option>
                    </select>
                    <input type="checkbox" id="rerank-toggle" checked style="margin-left: 0.75rem;" />
                    <label for="rerank-toggle">Rerank with</label>
                    <select id="rerank-model"></select>
                    <label for="affect-select" style="margin-left: 0.75rem;">Affect</label>
                    <select id="affect-select">
                        <option value="">None</option>
                    </select>
                    <label for="affect-model-select" style="margin-left: 0.75rem;">Affect model</label>
                    <select id="affect-model-select"></select>
                    <label for="router-model-select" style="margin-left: 0.75rem;">Router model</label>
                    <select id="router-model-select"></select>
                </div>
            </form>
        </div>

        <script>
            const messagesDiv = document.getElementById("messages");
            const chatForm = document.getElementById("chat-form");
            const questionInput = document.getElementById("question");
            const sendBtn = document.getElementById("send-btn");
            const rerankToggle = document.getElementById("rerank-toggle");
            const rerankModelSelect = document.getElementById("rerank-model");
            const affectSelect = document.getElementById("affect-select");
            const affectModelSelect = document.getElementById("affect-model-select");
            const collectionSelect = document.getElementById("collection-select");
            const routerModelSelect = document.getElementById("router-model-select");

            // Populate collection dropdown from server
            fetch("/collections")
                .then((r) => r.json())
                .then(({ collections }) => {
                    collections.forEach((c) => {
                        const opt = document.createElement("option");
                        opt.value = c.name;
                        opt.textContent = c.display_name || c.name;
                        collectionSelect.appendChild(opt);
                    });
                })
                .catch(() => {});

            // Populate model dropdowns from server
            fetch("/models")
                .then((r) => r.json())
                .then(({ rerank_models, affect_models, router_models }) => {
                    rerank_models.forEach((m) => {
                        const opt = document.createElement("option");
                        opt.value = m;
                        opt.textContent = m;
                        rerankModelSelect.appendChild(opt);
                    });
                    affect_models.forEach((m) => {
                        const opt = document.createElement("option");
                        opt.value = m;
                        opt.textContent = m;
                        affectModelSelect.appendChild(opt);
                    });
                    (router_models || []).forEach((m) => {
                        const opt = document.createElement("option");
                        opt.value = m;
                        opt.textContent = m;
                        routerModelSelect.appendChild(opt);
                    });
                })
                .catch(() => {
                    const opt = document.createElement("option");
                    opt.textContent = "unavailable";
                    rerankModelSelect.appendChild(opt);
                });

            // Populate affect dropdown from server
            fetch("/affects")
                .then((r) => r.json())
                .then(({ affects }) => {
                    affects.forEach((v) => {
                        const opt = document.createElement("option");
                        opt.value = v;
                        opt.textContent = v.charAt(0).toUpperCase() + v.slice(1);
                        affectSelect.appendChild(opt);
                    });
                })
                .catch(() => {});

            function addMessage(type, content, rawJson = null) {
                const messageDiv = document.createElement("div");
                messageDiv.className = `message ${type}`;

                if (type === "user") {
                    messageDiv.innerHTML = `
                    <div class="message-label">You:</div>
                    <div>${escapeHtml(content)}</div>
                `;
                } else if (type === "bot") {
                    const verse = content;
                    const jsonId = "json-" + Date.now();
                    const elapsed = verse.elapsed_ms
                        ? ` (${verse.elapsed_ms.toFixed(1)}ms)`
                        : "";
                    const displayText = verse.affected_text || verse.text;
                    const hasAffect = !!verse.affected_text;
                    const affectLabel = verse.affect ? ` [${verse.affect}]` : "";
                    const collectionLabel = verse.collection ? ` (${verse.collection})` : "";
                    messageDiv.innerHTML = `
                    <div class="message-label">Verse${affectLabel}${collectionLabel}:${elapsed}</div>
                    <div class="verse-text">${escapeHtml(displayText)}</div>
                    ${hasAffect ? `<div class="verse-original" title="Original">${escapeHtml(verse.text)}</div>` : ""}
                    <div class="verse-meta">${verse.book ? escapeHtml(verse.book) + " " : ""}${escapeHtml(verse.source)}${verse.testament ? " · " + escapeHtml(verse.testament) : ""}</div>
                    ${verse.description ? `<div class="verse-description">${escapeHtml(verse.description)}</div>` : ""}
                    ${
                        rawJson
                            ? `
                        <button class="json-toggle" onclick="toggleJson('${jsonId}')">Show JSON</button>
                        <div id="${jsonId}" class="json-content">${escapeHtml(JSON.stringify(rawJson, null, 2))}</div>
                    `
                            : ""
                    }
                `;
                } else if (type === "error") {
                    messageDiv.innerHTML = `
                    <div class="message-label">Error:</div>
                    <div>${escapeHtml(content)}</div>
                `;
                }

                messagesDiv.appendChild(messageDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }

            function toggleJson(id) {
                const jsonDiv = document.getElementById(id);
                const btn = jsonDiv.previousElementSibling;
                if (jsonDiv.classList.contains("visible")) {
                    jsonDiv.classList.remove("visible");
                    btn.textContent = "Show JSON";
                } else {
                    jsonDiv.classList.add("visible");
                    btn.textContent = "Hide JSON";
                }
            }

            function escapeHtml(text) {
                const div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }

            chatForm.addEventListener("submit", async (e) => {
                e.preventDefault();

                const question = questionInput.value.trim();
                if (!question) return;

                // Disable form while processing
                questionInput.disabled = true;
                sendBtn.disabled = true;

                // Show user's question
                addMessage("user", question);
                questionInput.value = "";

                try {
                    const response = await fetch("/query", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            question,
                            collection: collectionSelect.value || undefined,
                            rerank: rerankToggle.checked,
                            rerank_model: rerankModelSelect.value || undefined,
                            affect: affectSelect.value || undefined,
                            affect_model: affectModelSelect.value || undefined,
                            router_model: routerModelSelect.value || undefined,
                        }),
                    });
                    const data = await response.json();

                    if (response.ok) {
                        addMessage("bot", data, data);
                    } else {
                        addMessage(
                            "error",
                            data.error || "Unknown error occurred",
                        );
                    }
                } catch (error) {
                    addMessage("error", `Network error: ${error.message}`);
                } finally {
                    questionInput.disabled = false;
                    sendBtn.disabled = false;
                    questionInput.focus();
                }
            });

            // Focus input on load
            questionInput.focus();
        </script>
    </body>
</html>
