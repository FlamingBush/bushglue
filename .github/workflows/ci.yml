name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [audio, core, discord, sentiment]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync ${{ matrix.service }} (with test extras)
        working-directory: services/${{ matrix.service }}
        run: uv sync --extra test

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: uv run pytest tests/ -v
